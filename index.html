<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biofeedback Social Feed</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>

    <div id="overlay">
        <button id="start-btn">DÉMARRER L'EXPÉRIENCE</button>
    </div>

    <div id="status">
        <span class="label-tech">ACTIVITÉ ÉLECTRODERMALE</span>
        <span id="eda-val">0</span> <span class="unit">/ 1024</span>
    </div>

    <div id="feed">
        <div class="video-card">
            <video src="./assets/videos/1.mp4" loop muted playsinline></video>
            <div class="video-label">Contenu Calme 🌿</div>
        </div>
        <div class="video-card">
            <video src="./assets/videos/1.mp4" loop muted playsinline></video>
            <div class="video-label">Contenu Stressant ⚡</div>
        </div>
        <div class="video-card">
            <video src="./assets/videos/1.mp4" loop muted playsinline></video>
            <div class="video-label">Flux d'Information 🗞️</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
